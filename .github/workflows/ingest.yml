# Place this at .github/workflows/ingest.yml in the PUBLIC aipp-weather-ingest repo.
# (Stored here with a flat name so it isn't an active workflow in the app repo.)
name: ingest

on:
  schedule:
    - cron: "0 7 * * *"    # ~00z ECMWF run, available by ~06-07z
    - cron: "0 19 * * *"   # ~12z ECMWF run, available by ~18-19z
  workflow_dispatch: {}
  repository_dispatch:
    types: [ingest]        # external free cron (cron-job.org / CF Worker)

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System eccodes
        run: sudo apt-get update && sudo apt-get install -y libeccodes-tools
      - name: Python deps
        run: pip install ecmwf-opendata cfgrib xarray numpy netCDF4 copernicusmarine boto3
      - name: Run ingest
        continue-on-error: false
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        run: python ingest.py
