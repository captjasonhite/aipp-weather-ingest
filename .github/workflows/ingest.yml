name: ingest

  on:
    schedule:
      - cron: "0 7 * * *"
      - cron: "0 19 * * *"
    workflow_dispatch: {}
    repository_dispatch:
      types: [ingest]

  concurrency:
    group: ingest
    cancel-in-progress: false

  permissions:
    contents: write

  jobs:
    ingest:
      runs-on: ubuntu-latest
      timeout-minutes: 30
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"
        - name: System eccodes
          run: sudo apt-get update && sudo apt-get install -y libeccodes-tools
        - name: Python deps
          run: pip install ecmwf-opendata cfgrib xarray numpy netCDF4
  copernicusmarine
        - name: Run ingest
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            COPERNICUSMARINE_SERVICE_USERNAME: ${{
  secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
            COPERNICUSMARINE_SERVICE_PASSWORD: ${{
  secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
          run: python ingest.py
